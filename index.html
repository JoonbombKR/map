<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>솔레아스 지점지도</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xw0tk9m5e9&submodules=geocoder"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100vh; background-color: #f0f0f0; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
// 네이버 객체가 완전히 로드될 때까지 기다림
window.onload = function() {
    if (typeof naver === 'undefined' || !naver.maps.Service) {
        console.error("네이버 지도 로드 실패 - 인증이나 네트워크 확인 필요");
        return;
    }

    var map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(36.5, 127.8),
        zoom: 7
    });

    var branches = [
        "부천상동점","시흥목감점","안산고잔점","부천신중동점","일산중산점",
        "분당오리점","논산내동점","시흥은계점","광주풍암점","수원광교점",
        "부평삼산점","수원영통점","안성시청점","광주수완점","광주봉선점",
        "분당판교점","송파잠실점","대구달서점","천안불당점","김포시청점",
        "동탄역점","광명철산점","포항장성점","노원중계점","송파문정점",
        "대전도안점","다산신도시점","시흥배곧점"
    ];

    var goldMarkerHtml = '<div style="background:gold;width:16px;height:16px;border-radius:50%;border:2px solid #333;box-shadow:2px 2px 5px rgba(0,0,0,0.3);"></div>';

    branches.forEach(function(name) {
        // '솔레아스풋볼' 키워드를 포함하여 검색 정확도 향상
        naver.maps.Service.geocode({
            query: '솔레아스풋볼 ' + name
        }, function(status, response) {
            if (status !== naver.maps.Service.Status.OK) {
                console.error(name + " 검색 중 에러 발생: " + status);
                return;
            }

            var result = response.v2.addresses[0];
            if (!result) return;

            var marker = new naver.maps.Marker({
                position: new naver.maps.LatLng(result.y, result.x),
                map: map,
                icon: {
                    content: goldMarkerHtml,
                    anchor: new naver.maps.Point(8, 8)
                }
            });

            var infoWindow = new naver.maps.InfoWindow({
                content: '<div style="padding:10px;font-size:12px;font-weight:bold;">' + name + '</div>'
            });

            naver.maps.Event.addListener(marker, "click", function() {
                if (infoWindow.getMap()) {
                    infoWindow.close();
                } else {
                    infoWindow.open(map, marker);
                }
            });
        });
    });
};
</script>
</body>
</html>
