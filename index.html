<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>솔레아스풋볼 지점 안내</title>
    <script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xw0tk9m5e9&ncpKeyId=xw0tk9m5e9&submodules=geocoder"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
<div id="map"></div>

<script>
var map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(36.5, 127.8),
    zoom: 7
});

// ✅ 좌표를 삭제하고 주소와 연락처만 남긴 데이터셋
var branches = [
    { name:"솔레아스풋볼 송파잠실점", addr:"서울특별시 송파구 석촌호수로 262", tel:"02-2038-2581" },
    { name:"솔레아스풋볼 부천상동점", addr:"경기도 부천시 원미구 부흥로 14", tel:"032-323-9195" },
    { name:"솔레아스풋볼 시흥목감점", addr:"경기도 시흥시 수인로 2323", tel:"031-504-6172" },
    { name:"솔레아스풋볼 안산고잔점", addr:"경기도 안산시 단원구 광덕대로 161", tel:"031-402-0116" },
    { name:"솔레아스풋볼 일산중산점", addr:"경기도 고양시 일산동구 약산길 2", tel:"031-994-0340" },
    { name:"솔레아스풋볼 분당오리점", addr:"경기도 성남시 분당구 무지개로 144", tel:"031-719-1129" },
    { name:"솔레아스풋볼 논산내동점", addr:"충청남도 논산시 시민로 235", tel:"041-734-0308" },
    { name:"솔레아스풋볼 시흥은계점", addr:"경기도 시흥시 은계중앙로306번길 36", tel:"031-362-5551" },
    { name:"솔레아스풋볼 광주풍암점", addr:"광주광역시 서구 회재로 1054", tel:"062-671-0055" },
    { name:"솔레아스풋볼 수원광교점", addr:"경기도 수원시 영통구 광교중앙로248번길 7-2", tel:"031-895-4195" },
    { name:"솔레아스풋볼 부평삼산점", addr:"인천광역시 부평구 장제로 336", tel:"032-522-5223" },
    { name:"솔레아스풋볼 수원영통점", addr:"경기도 수원시 영통구 반달로 21", tel:"031-8002-5411" },
    { name:"솔레아스풋볼 안성시청점", addr:"경기도 안성시 가사동 126-1", tel:"031-677-6954" },
    { name:"솔레아스풋볼 광주수완점", addr:"광주광역시 광산구 임방울대로 611-30", tel:"062-954-9990" },
    { name:"솔레아스풋볼 광주봉선점", addr:"광주광역시 남구 제석로 79", tel:"062-675-1004" },
    { name:"솔레아스풋볼 분당판교점", addr:"경기도 성남시 분당구 판교로 375", tel:"031-701-1018" },
    { name:"솔레아스풋볼 천안불당점", addr:"충청남도 천안시 서북구 불당34길 25-2", tel:"041-522-8029" },
    { name:"솔레아스풋볼 대구달서점", addr:"대구광역시 달서구 진천로 21", tel:"053-633-1888" },
    { name:"솔레아스풋볼 김포시청점", addr:"경기도 김포시 사우중로 48", tel:"031-982-0813" },
    { name:"솔레아스풋볼 동탄역점", addr:"경기도 화성시 동탄대로 446", tel:"031-374-0302" },
    { name:"솔레아스풋볼 광명철산점", addr:"경기도 광명시 철산동 424", tel:"02-2066-0830" },
    { name:"솔레아스풋볼 포항장성점", addr:"경북 포항시 북구 새천년대로 1123", tel:"0507-1313-4860" },
    { name:"솔레아스풋볼 노원중계점", addr:"서울 노원구 노원로 247", tel:"02-979-7787" },
    { name:"솔레아스풋볼 송파문정점", addr:"서울 송파구 송이로 194", tel:"02-3012-9298" },
    { name:"솔레아스풋볼 대전도안점", addr:"대전 서구 도안동로 234-15", tel:"042-331-7652" },
    { name:"솔레아스풋볼 다산신도시점", addr:"경기 남양주시 미금로 134", tel:"031-557-7707" }
];

branches.forEach(function(branch) {
    // 네이버 Geocoding 서비스 호출
    naver.maps.Service.geocode({ query: branch.addr }, function(status, response) {
        if (status !== naver.maps.Service.Status.OK) return;

        var result = response.v2.addresses[0];
        var point = new naver.maps.LatLng(result.y, result.x);

        // 1. 물방울 모양 골드 마커 생성
        var marker = new naver.maps.Marker({
            position: point,
            map: map,
            icon: {
                content: `
                <div style="cursor:pointer; width:22px; height:30px;">
                    <svg width="22" height="30" viewBox="0 0 100 136" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 0C22.3858 0 0 22.3858 0 50C0 67.4568 9.07466 82.7845 22.8462 91.6854L50 136L77.1538 91.6854C90.9253 82.7845 100 67.4568 100 50C100 22.3858 77.6142 0 50 0Z" fill="#333"/>
                        <path d="M50 8C26.804 8 8 26.804 8 50C8 64.6067 15.6027 77.4243 27.1246 84.8872L50 122.2L72.8754 84.8872C84.3973 77.4243 92 64.6067 92 50C92 26.804 73.196 8 50 8Z" fill="#cbb85f"/>
                        <circle cx="50" cy="50" r="15" fill="white"/>
                    </svg>
                </div>`,
                anchor: new naver.maps.Point(11, 30)
            }
        });

        // 2. 검은색 텍스트 라벨 생성
        var label = new naver.maps.Marker({
            position: point,
            map: map,
            icon: {
                content: '<div style="font-size:11px;font-weight:bold;color:#000;background:rgba(255,255,255,0.9);padding:2px 5px;border-radius:4px;border:1px solid #999;white-space:nowrap;margin-top:-60px;">'+branch.name.replace("솔레아스풋볼 ", "")+'</div>',
                anchor: new naver.maps.Point(20, 0)
            }
        });

        // 3. 클릭 시 정보창
        var infoWindow = new naver.maps.InfoWindow({
            content: `
            <div style="padding:15px;min-width:200px;line-height:1.6;font-family:'Malgun Gothic', sans-serif;">
                <strong style="font-size:14px;color:#cbb85f;font-weight:bold;">${branch.name}</strong><br>
                <span style="font-size:12px;color:#666;display:block;margin-top:5px;">📍 ${branch.addr}</span>
                <span style="font-size:12px;color:#333;font-weight:bold;display:block;margin-top:2px;">📞 ${branch.tel}</span>
            </div>`,
            borderWidth: 1,
            borderColor: "#cbb85f",
            disableAnchor: true
        });

        naver.maps.Event.addListener(marker, "click", function() {
            if (infoWindow.getMap()) {
                infoWindow.close();
            } else {
                infoWindow.open(map, marker);
            }
        });
    });
});
</script>
</body>
</html>
