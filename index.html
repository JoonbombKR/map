<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xw0tk9m5e9"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(36.5, 127.8),
        zoom: 7
    });

    // 1. 네이버에 물어보지 않고 직접 좌표를 입력 (에러 발생 소지 차단)
    var locations = [
        { name: "부천상동점", lat: 37.5034, lng: 126.7512 },
        { name: "시흥목감점", lat: 37.3821, lng: 126.8795 },
        { name: "안산고잔점", lat: 37.3015, lng: 126.8234 },
        { name: "분당판교점", lat: 37.4011, lng: 127.1086 },
        { name: "광주봉선점", lat: 35.1264, lng: 126.9084 },
        { name: "시흥은계점", lat: 37.4475, lng: 126.8043 },
        { name: "대전도안점", lat: 36.3458, lng: 127.3402 }
    ];

    var goldMarkerHtml = '<div style="background:gold;width:16px;height:16px;border-radius:50%;border:2px solid #333;box-shadow:2px 2px 5px rgba(0,0,0,0.3);"></div>';

    locations.forEach(function(loc) {
        var marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(loc.lat, loc.lng),
            map: map,
            icon: {
                content: goldMarkerHtml,
                anchor: new naver.maps.Point(8, 8)
            }
        });

        var infoWindow = new naver.maps.InfoWindow({
            content: '<div style="padding:10px;font-size:12px;font-weight:bold;">솔레아스 ' + loc.name + '</div>'
        });

        naver.maps.Event.addListener(marker, "click", function() {
            if (infoWindow.getMap()) {
                infoWindow.close();
            } else {
                infoWindow.open(map, marker);
            }
        });
    });
</script>
</body>
</html>
