    { name:"솔레아스풋볼 논산내동점", lat:36.1878880, lng:127.0985550, addr:"충청남도 논산시 시민로 235, 2층 외 1필지", tel:"041-734-0308" },
    { name:"솔레아스풋볼 시흥은계점", lat:37.4530644, lng:126.7992114, addr:"경기도 시흥시 은계중앙로306번길 36, 1동 2층 201호", tel:"031-362-5551" },
    { name:"솔레아스풋볼 광주풍암점", lat:35.1235550, lng:126.8812880, addr:"광주광역시 서구 회재로 1054, 6층 602호", tel:"062-671-0055" },
    { name:"솔레아스풋볼 수원광교점", lat:37.2982880, lng:127.0481880, addr:"경기도 수원시 영통구 광교중앙로248번길 7-2, A동 지하 1층", tel:"031-895-4195" },
    { name:"솔레아스풋볼 부평삼산점", lat:37.5155248, lng:126.7325346, addr:"인천광역시 부평구 장제로 336, 3층", tel:"032-522-5223" },
    { name:"솔레아스풋볼 수원영통점", lat:37.2515880, lng:127.0712550, addr:"경기도 수원시 영통구 반달로 21, 7층 701-1호", tel:"031-8002-5411" },

    { name:"솔레아스풋볼 광주수완점", lat:35.1915880, lng:126.8234550, addr:"광주광역시 광산구 임방울대로 611-30, 2층", tel:"062-954-9990" },
    { name:"솔레아스풋볼 광주봉선점", lat:35.1264880, lng:126.9084550, addr:"광주광역시 남구 제석로 79, 3층", tel:"062-675-1004" },
    { name:"솔레아스풋볼 분당판교점", lat:37.4042078, lng:127.1152923, addr:"경기도 성남시 분당구 판교로 375, 에메트타운 지하 1층", tel:"031-701-1018" },
    { name:"솔레아스풋볼 송파잠실점", lat:37.5065550, lng:127.1023880, addr:"서울특별시 송파구 석촌호수로 176, 3 & 4층", tel:"02-2038-2581" },
    { name:"솔레아스풋볼 천안불당점", lat:36.8152412, lng:127.1135124, addr:"충청남도 천안시 서북구 불당34길 25-2, THE VISTA 빌딩 3층", tel:"041-522-8029" },
    { name:"솔레아스풋볼 대구달서점", lat:35.8205880, lng:128.5321550, addr:"대구광역시 달서구 진천로 21, B1F & RF", tel:"053-633-1888" },
    { name:"솔레아스풋볼 김포시청점", lat:37.6152880, lng:126.7154550, addr:"경기도 김포시 사우중로 48, 5층", tel:"031-982-0813" },
    { name:"솔레아스풋볼 동탄역점", lat:37.1995880, lng:127.0964550, addr:"경기도 화성시 동탄대로 446, 3층", tel:"031-374-0302" },
    { name:"솔레아스풋볼 광명철산점", lat:37.4762880, lng:126.8675550, addr:"경기도 광명시 철산동 424, 지하 2층", tel:"02-2066-0830" },

    { name:"솔레아스풋볼 노원중계점", lat:37.6495880, lng:127.0762550, addr:"서울 노원구 노원로 247 지하2층", tel:"02-979-7787" },
    { name:"솔레아스풋볼 송파문정점", lat:37.4851220, lng:127.1235550, addr:"서울 송파구 송이로 194 5층", tel:"02-3012-9298" },
    { name:"솔레아스풋볼 대전도안점", lat:36.3458880, lng:127.3402550, addr:"대전 서구 도안동로 234-15 지하1층", tel:"042-331-7652" },
    { name:"솔레아스풋볼 다산신도시점", lat:37.6115880, lng:127.1648880, addr:"경기 남양주시 미금로 134 302호", tel:"031-557-7707" }
];

branches.forEach(function(branch) {

    var position = new naver.maps.LatLng(branch.lat, branch.lng);

    // 🔥 금색 물방울 마커
    var marker = new naver.maps.Marker({
        position: position,
        map: map,
        icon: {
            content: `
            <div style="width:26px;height:36px;cursor:pointer;">
                <svg width="26" height="36" viewBox="0 0 100 136">
                    <path d="M50 0C22 0 0 22 0 50C0 70 12 85 25 95L50 136L75 95C88 85 100 70 100 50C100 22 78 0 50 0Z" fill="#cbb85f"/>
                    <circle cx="50" cy="50" r="12" fill="white"/>
                </svg>
            </div>`,
            anchor: new naver.maps.Point(13, 36)
        }
    });

    // 🔥 지점명 라벨 (팝업 느낌)
    var label = new naver.maps.Marker({
        position: position,
        map: map,
        icon: {
            content: `
            <div style="
                background:#fff;
                padding:4px 8px;
                border-radius:6px;
                border:1px solid #cbb85f;
                font-size:11px;
                font-weight:bold;
                white-space:nowrap;
                box-shadow:0 2px 6px rgba(0,0,0,0.15);
                transform:translateY(-45px);
            ">
                ${branch.name}
            </div>`
        }
    });

    // 🔥 클릭 팝업
    var infoWindow = new naver.maps.InfoWindow({
        content: `
        <div style="padding:12px;min-width:200px;font-family:sans-serif;">
            <div style="font-weight:bold;color:#cbb85f;font-size:14px;">
                ${branch.name}
            </div>
            <div style="margin-top:6px;font-size:12px;color:#555;">
                📍 ${branch.addr}
            </div>
            <div style="font-size:12px;font-weight:bold;">
                📞 ${branch.tel}
            </div>
        </div>`
    });

    infoWindows.push(infoWindow);

    // 클릭 시 하나만 열리게
    naver.maps.Event.addListener(marker, "click", function() {

        infoWindows.forEach(function(iw) {
            iw.close();
        });

        infoWindow.open(map, marker);
    });

});

</script>
</body>
</html>
