<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>솔레아스풋볼 지점 안내</title>

<script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xw0tk9m5e9"></script>

<style>
body, html { margin:0; padding:0; width:100%; height:100%; }
#map { width:100%; height:100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script>
var map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.5665, 126.9780),
    zoom: 7
});

// 🔥 여기다가 좌표만 직접 넣으면 끝
var branches = [
    { name:"부천상동점", lat:37.503, lng:126.753 },
    { name:"시흥목감점", lat:37.382, lng:126.859 },
    { name:"안산고잔점", lat:37.321, lng:126.830 },
    { name:"부천신중동점", lat:37.503, lng:126.766 },
    { name:"일산중산점", lat:37.682, lng:126.777 },
    { name:"분당오리점", lat:37.339, lng:127.108 },
    { name:"논산내동점", lat:36.187, lng:127.098 },
    { name:"시흥은계점", lat:37.431, lng:126.804 },
    { name:"광주풍암점", lat:35.127, lng:126.880 },
    { name:"수원광교점", lat:37.287, lng:127.051 },
    { name:"부평삼산점", lat:37.506, lng:126.739 },
    { name:"수원영통점", lat:37.251, lng:127.071 },
    { name:"안성시청점", lat:37.007, lng:127.279 },
    { name:"광주수완점", lat:35.190, lng:126.822 },
    { name:"광주봉선점", lat:35.120, lng:126.900 },
    { name:"분당판교점", lat:37.394, lng:127.111 },
    { name:"송파잠실점", lat:37.507, lng:127.099 },
    { name:"대구달서점", lat:35.829, lng:128.532 },
    { name:"천안불당점", lat:36.815, lng:127.109 },
    { name:"김포시청점", lat:37.615, lng:126.715 },
    { name:"동탄역점", lat:37.200, lng:127.098 },
    { name:"광명철산점", lat:37.475, lng:126.868 },
    { name:"포항장성점", lat:36.065, lng:129.378 },
    { name:"노원중계점", lat:37.648, lng:127.073 },
    { name:"송파문정점", lat:37.485, lng:127.122 },
    { name:"대전도안점", lat:36.308, lng:127.341 },
    { name:"다산신도시점", lat:37.652, lng:127.156 }
];

// 마커 생성
branches.forEach(function(branch){

    var marker = new naver.maps.Marker({
        position: new naver.maps.LatLng(branch.lat, branch.lng),
        map: map
    });

    var infoWindow = new naver.maps.InfoWindow({
        content: `<div style="padding:10px;">${branch.name}</div>`
    });

    naver.maps.Event.addListener(marker, "click", function() {
        infoWindow.open(map, marker);
    });

});
</script>

</body>
</html>
